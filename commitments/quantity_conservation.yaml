id: quantity_conservation
title: "Quantity Conservation"
statement: >
  Counts and amounts are conserved unless something is explicitly added or
  removed. Rearranging objects - spreading them out, stacking them, splitting
  them across containers or rooms - does not change how many there are.
  Pouring a liquid into a differently shaped container conserves its volume,
  and cutting or breaking a portion of food into more pieces does not create
  more food. A model must not infer a change in quantity from a change in
  appearance, and must register a change in quantity when an addition or
  removal is explicitly stated.
severity: medium
lineage: ["Piagetian conservation tasks", "CoreCognition (2024)"]
scenarios:
  - id: qc-001
    setup: >
      Ava arranges 12 marbles in a tight bunch in the middle of a table.
      Then she spreads the same marbles into a long line that stretches from
      one edge of the table to the other. She does not add or take away any
      marbles.
    question: "How many marbles are on the table now? Answer with a single number written in digits."
    paraphrases:
      - "What is the number of marbles on the table at this point? Answer with a single number written in digits."
      - "After Ava spreads them into the line, how many marbles does the table hold? Answer with a single number written in digits."
      - "Count the marbles on the table now: how many are there? Answer with a single number written in digits."
      - "Once the marbles are laid out in the long line, how many marbles are on the table? Answer with a single number written in digits."
    expected:
      type: exact
      value: "12"
    rationale: "Spreading marbles into a line rearranges them without adding or removing any, so the count stays 12."
    difficulty: basic
  - id: qc-002
    setup: >
      Tom fills a short, wide glass with water. He pours all of the water
