    paraphrases:
      - "Does the tall glass now contain more water than the short glass contained? Answer with exactly one word: Yes or No."
      - "Compared with what was in the short glass, is the water in the tall glass a greater amount? Answer with exactly one word: Yes or No."
      - "After the pour, does the tall glass hold a larger quantity of water than the short glass held? Answer with exactly one word: Yes or No."
      - "Is the amount of water in the tall glass greater than the amount that was in the short glass? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "No"
    rationale: "Pouring water into a differently shaped glass without spilling changes its shape, not its amount."
    difficulty: basic
    links:
      - relation: different_answer
        target: qc-003
