id: entity_persistence
title: "Entity Persistence"
statement: >
  An entity keeps its identity through renaming, relabeling, movement, and
  superficial change such as repainting, cleaning, grooming, or the repair of
  a part - and it does NOT keep its identity through total replacement. A model
  must track that one object called by two names is still one object, that a
  moved or repainted object is the same object, and that a destroyed or lost
  object replaced by a lookalike is a different object. Likewise, two distinct
  entities that happen to share a name remain two distinct entities.
severity: medium
lineage: ["BeliefBank (2021)", "Winograd Schema Challenge (2012)"]
scenarios:
  - id: ep-001
    setup: >
      The Nguyen family has exactly one pet cat, named Biscuit. The grandfather
      always calls the cat "Fluff", while the youngest daughter calls the same
      animal "Bibi". Every evening the grandfather feeds Fluff, and every
      morning the daughter brushes Bibi.
    question: "Is the cat the grandfather feeds the same cat the daughter brushes? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Is the animal that gets fed by the grandfather each evening the very same cat the daughter brushes each morning? Answer with exactly one word: Yes or No."
      - "The grandfather feeds Fluff and the daughter brushes Bibi. Are they tending to one and the same cat? Answer with exactly one word: Yes or No."
      - "Does the daughter brush the same cat that the grandfather feeds? Answer with exactly one word: Yes or No."
      - "Are Fluff and Bibi the same single cat? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "Yes"
    rationale: "The family has exactly one cat, so both nicknames refer to the same animal."
    difficulty: basic
    links:
      - relation: different_answer
        target: ep-016
      - relation: same_answer
        target: ep-022
