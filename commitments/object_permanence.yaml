id: object_permanence
title: "Object Permanence"
statement: >
  Objects that become occluded, covered, enclosed, or otherwise unobserved
  continue to exist and retain their properties (location, color, count,
  identity) until something physically acts on them. A model must not treat
  loss of visual access - a screen, a closed lid, darkness, a stacked or
  nested container - as destruction or alteration of the hidden object, and
  must not confuse actions performed on a different object with actions on
  the hidden one.
severity: high
lineage: ["CoreCognition (2024)", "EWOK (2024)", "Piaget (1954)", "Baillargeon (1987)"]
scenarios:
  - id: op-001
    setup: >
      A red rubber ball rolls across the floor of a living room and passes
      behind a wide wooden screen standing in the middle of the room. The
      ball has not come out on either side of the screen, and nobody has
      touched the screen or the ball since.
    question: "Is the ball still behind the screen? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Is the red rubber ball behind the wooden screen right now? Answer with exactly one word: Yes or No."
      - "Right now, does the screen still have the ball behind it? Answer with exactly one word: Yes or No."
      - "At this moment, is the ball located behind the screen? Answer with exactly one word: Yes or No."
      - "If someone walked around the screen right now, would they find the ball behind it? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "Yes"
    rationale: "The ball went behind the screen and has not exited or been moved, so it remains behind the screen."
    difficulty: basic
