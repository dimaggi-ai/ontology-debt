id: negation_invariance
title: "Negation Invariance"
statement: >
  A question and its negation about the same situation must receive
  complementary answers: if "Is the box empty?" is answered Yes, then
  "Does the box contain anything?" must be answered No, and vice versa.
  Double negation must resolve to the plain affirmative ("it is not the
  case that the door was left unlocked" means the door was locked), and
  this resolution must survive distractors, quantified negation ("not a
  single", "none of"), and paraphrase. A model that flips its answer when
  the question is negated, or that miscounts the negations in a setup,
  does not hold a stable model of the described situation.
severity: medium
lineage: ["CondaQA (2022)", "ParaRel negation probes (2021)", "BECEL negational consistency (2022)"]
scenarios:
  - id: ni-001
    setup: >
      A cardboard box sits on Marta's kitchen table. This morning she took
      every item out of the box and put them all on a shelf. Since then,
      nobody has put anything into the box.
    question: "Is the box empty now? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Right now, is the box empty? Answer with exactly one word: Yes or No."
      - "Would you say the box is empty at this point? Answer with exactly one word: Yes or No."
      - "At this moment, is Marta's box empty? Answer with exactly one word: Yes or No."
      - "Is the box on the kitchen table empty now? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "Yes"
    rationale: "Every item was removed and nothing was added afterward, so the box is empty."
    difficulty: basic
    links:
      - relation: different_answer
        target: ni-002
