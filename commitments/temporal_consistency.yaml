id: temporal_consistency
title: "Temporal Consistency"
statement: >
  A model must maintain a coherent timeline over explicitly stated times and
  durations: if event A occurs before event B, then B did not occur before A;
  a person born after an event cannot have been present at it; stated
  durations combine additively; an activity is not finished before its stated
  finishing time and remains finished afterward; and nothing that happens
  later can alter what already happened earlier. These relations must survive
  out-of-order narration and irrelevant or misleading time references.
severity: high
lineage: ["ChronoScope (2026)", "BECEL temporal consistency"]
scenarios:
  - id: tc-001
    setup: >
      At a village fair, the pie-eating contest started at 3:00pm and the
      sack race started at 5:00pm on the same day.
    question: "Did the sack race start before the pie-eating contest? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Was the start of the sack race earlier than the start of the pie-eating contest? Answer with exactly one word: Yes or No."
      - "Did the sack race get underway before the pie-eating contest did? Answer with exactly one word: Yes or No."
      - "Is it true that the sack race began earlier in the day than the pie-eating contest? Answer with exactly one word: Yes or No."
      - "Had the sack race already started by the time the pie-eating contest started? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "No"
    rationale: "The sack race started at 5:00pm, two hours after the 3:00pm contest, so it did not start before it."
    difficulty: basic
    links:
      - relation: different_answer
        target: tc-002
