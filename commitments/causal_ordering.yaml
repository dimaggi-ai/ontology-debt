id: causal_ordering
title: "Causal Ordering"
statement: >
  Causes precede their effects: an effect cannot occur before the event that
  produces it. When a necessary cause is absent, the effect does not occur.
  Two events happening together or in sequence does not by itself make one
  the cause of the other, and an event that arrives after the effect has
  already occurred did not produce it. A model must keep this ordering and
  dependence straight even when a story narrates the effect before the cause,
  when coincident events invite a spurious causal reading, or when a
  would-be cause is preempted by an earlier one.
severity: high
lineage: ["EWOK (2024)", "COPA (2011)", "CRASS (2022)"]
scenarios:
  - id: co-001
    setup: >
      Maya lines up ten dominoes in a straight row on a steady table. She tips
      the first domino with her finger, each falling domino knocks over the
      next one, and after a moment the tenth domino falls.
    question: "Did Maya tip the first domino before the tenth domino fell? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Did the tenth domino fall only after Maya had tipped the first one? Answer with exactly one word: Yes or No."
      - "Was Maya's tip of the first domino earlier in time than the fall of the tenth domino? Answer with exactly one word: Yes or No."
      - "By the time the tenth domino fell, had Maya already tipped the first domino? Answer with exactly one word: Yes or No."
      - "Did Maya's finger touch the first domino at some point before the tenth domino went down? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "Yes"
    rationale: "The tenth domino fell through a chain started by Maya's tip, so the tip necessarily came first."
    difficulty: basic

