name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]  # floor and ceiling
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: python -m pytest -q
      - run: ontodebt validate
      - run: ontodebt run --models mock --limit 3 --results /tmp/smoke
      - run: ontodebt audit-agent --transcripts tests/fixtures --rules agent_commitments --results /tmp/agent-smoke
