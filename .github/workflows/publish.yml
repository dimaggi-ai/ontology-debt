name: publish

# Publishes to PyPI via Trusted Publishing (OIDC) - no API token stored.
# Fires when you publish a GitHub Release, and can be run manually the first
# time from the Actions tab (workflow_dispatch) once the PyPI pending
# publisher is configured.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi          # must match the environment name on the PyPI publisher
    permissions:
      id-token: write          # required for OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
