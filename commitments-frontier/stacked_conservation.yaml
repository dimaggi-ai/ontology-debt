    paraphrases:
      - "At the end, how many liters does the bucket hold? Answer with a single number written in digits."
      - "After every step in the sequence has been carried out, what is the final water amount in liters? Answer with a single number written in digits."
      - "Count the liters of water left in the bucket. Answer with a single number written in digits."
      - "Once every step is done, how many liters are in the bucket? Answer with a single number written in digits."
    expected:
      type: exact
      value: "17"
    rationale: "The bucket goes 18, 24 (+6), 48 (doubled), 38 (-10), 19 (halved), 13 (-6), 17 (+4)."
    difficulty: adversarial
  - id: sc-008
    setup: >
      Basket A holds 50 eggs and Basket B holds 45 eggs. From Basket A, 30 eggs
      are moved into a crate, while the other 20 eggs stay in Basket A. In the
      crate, 8 eggs break and are thrown out. All of the unbroken crate eggs are
      then put back into Basket A. Before those crate eggs are returned, 3 eggs
      are removed from Basket A and cooked. After the crate eggs are back, 5 more
      eggs are added to Basket A, and then 3 eggs are removed from it. Separately,
      Basket B has 6 eggs removed, then 7 eggs added, then 5 eggs removed. No
      other eggs are added or removed.
    question: "Does Basket A now hold the same number of eggs as Basket B? Answer with exactly one word: Yes or No."
    paraphrases:
      - "At the end, is the egg count of Basket A equal to the egg count of Basket B? Answer with exactly one word: Yes or No."
      - "Do the two baskets end up with an equal number of eggs? Answer with exactly one word: Yes or No."
      - "Is the number of eggs in Basket A the same as the number in Basket B? Answer with exactly one word: Yes or No."
      - "After all the moves, does Basket A match Basket B in egg count? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "Yes"
    rationale: "Basket A keeps 20, loses 3 to cooking (17), gains the 22 unbroken crate eggs (39), gains 5 (44), and loses 3 (41). Basket B goes 45, 39, 46, 41. Both end at 41."
    difficulty: adversarial
    links:
      - relation: same_answer
        target: sc-002
  - id: sc-009
    setup: >
      There are four empty cups and a jug holding 840 milliliters of water. The
