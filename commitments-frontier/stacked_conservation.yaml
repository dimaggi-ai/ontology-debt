id: stacked_conservation
title: "Stacked Conservation"
statement: >
  A quantity - a count of objects or an amount of a substance - changes only
  by exactly the additions and removals that are explicitly stated, and by
  nothing else. Through a long chain of transfers, splits, recombinations,
  doublings, halvings, and even distributions, the model must track the net
  effect of every stated operation and report the true final quantity, or
  correctly judge whether two final states are equal. Rearranging, pouring,
  cutting, or spreading a quantity out never changes how much there is; only
  a stated add or remove does. The model must not be swayed by how much
  "more" or "less" a rearranged quantity looks, must ignore decoy operations
  on containers it is not asked about, and must not lose track of state
  across the length of the chain.
severity: high
lineage: ["Piagetian conservation tasks", "CoreCognition (2024)", "multi-step state-tracking (2024-2025)"]
scenarios:
  - id: sc-001
    setup: >
      A bag holds 48 marbles, while a box and a jar beside it both start empty.
      Nadia takes 12 marbles out of the bag and drops them into the box. She
      then puts 17 new marbles into the bag. Next she moves 20 marbles from the
      bag into the box. She doubles the number of marbles now in the box by
      adding fresh marbles to the box. She then takes 8 marbles out of the box
      and returns them to the bag. She moves 15 marbles from the bag into the
      jar. She removes 5 marbles from the jar and gives them away. She then puts
      9 more new marbles into the bag, and finally takes 6 marbles out of the
      bag and sets them aside. Nothing else is added to or removed from the bag.
    question: "How many marbles are in the bag now? Answer with a single number written in digits."
    paraphrases:
      - "After all of Nadia's moves, what is the number of marbles in the bag? Answer with a single number written in digits."
      - "Count the marbles left in the bag at the end. Answer with a single number written in digits."
      - "How many marbles does the bag contain once Nadia has finished? Answer with a single number written in digits."
      - "At the end of the sequence, how many marbles are in the bag? Answer with a single number written in digits."
    expected:
      type: exact
      value: "29"
    rationale: "The bag goes 48, 36 (-12), 53 (+17), 33 (-20), 41 (+8 back), 26 (-15 to jar), 35 (+9), 29 (-6). Doubling the box and removing from the jar never touch the bag."
    difficulty: adversarial
    links:
      - relation: different_answer
        target: sc-012
  - id: sc-002
    setup: >
      Three towers of blocks stand on a table, and no blocks are ever moved
      between towers. Tower X starts with 84 blocks; then 30 blocks are removed
      from it, then 26 blocks are added to it, then 8 blocks are removed from it.
      Tower Y starts with 30 blocks; then 18 blocks are added to it, then 12
      blocks are removed from it, and finally the number of blocks in Tower Y is
      doubled by stacking on an equal number of new blocks. Tower Z starts with
      50 blocks and then loses 10 blocks.
    question: "After these changes, does Tower X contain the same number of blocks as Tower Y? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Once the changes are done, is the block count of Tower X equal to the block count of Tower Y? Answer with exactly one word: Yes or No."
      - "Do Tower X and Tower Y end up holding an equal number of blocks? Answer with exactly one word: Yes or No."
      - "At the end, is the number of blocks in Tower X the same as the number in Tower Y? Answer with exactly one word: Yes or No."
      - "After all the additions and removals, does Tower X match Tower Y in block count? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "Yes"
    rationale: "Tower X becomes 84, 54, 80, 72; Tower Y becomes 30, 48, 36, then 72 when doubled; both end at 72, so they are equal. Tower Z is a decoy."
    difficulty: adversarial
    links:
      - relation: same_answer
        target: sc-008
  - id: sc-003
    setup: >
      A pitcher holds 900 milliliters of juice; a bowl, a cup, a glass, and a
      carafe all start empty. All 900 milliliters are poured from the pitcher
      into the bowl. Then 350 milliliters are poured from the bowl into the cup.
      Then 200 milliliters are poured from the bowl into the glass. Then all of
      the glass's juice is poured into the carafe. Then 250 milliliters are
      poured from the cup into the bowl. Finally 150 milliliters are poured from
      the bowl into the cup. Nothing is spilled and nothing clings to the
      containers.
    question: "How many milliliters of juice are in the bowl now? Answer with a single number written in digits."
    paraphrases:
      - "At the end, how many milliliters of juice does the bowl hold? Answer with a single number written in digits."
      - "After all the pouring, what is the amount of juice in the bowl, in milliliters? Answer with a single number written in digits."
      - "Count the milliliters of juice left in the bowl. Answer with a single number written in digits."
      - "Once every pour is complete, how many milliliters are in the bowl? Answer with a single number written in digits."
    expected:
      type: exact
      value: "450"
    rationale: "The bowl goes 900, 550 (-350), 350 (-200), then 600 (+250 from the cup), then 450 (-150), ending at 450. The glass-to-carafe pour never touches the bowl."
    difficulty: adversarial
    links:
      - relation: different_answer
        target: sc-009
  - id: sc-004
    setup: >
      There are three chocolate bars, each scored into 12 squares, for 36
      squares in total. Priya snaps every square apart and spreads all 36 loose
      squares across a wide tray, where they look like a big heap of chocolate.
      She eats 10 of the squares. A friend then brings one more bar of 12
      squares, snaps it into singles, and adds all of them to the tray. Priya
      eats 4 more squares. Next, 6 squares brought by a second friend are added
      to the tray. Finally, 10 squares are moved from the tray into a separate
      bowl. No squares are lost or dropped.
    question: "How many chocolate squares are on the tray now? Answer with a single number written in digits."
    paraphrases:
      - "At the end, how many chocolate squares does the tray hold? Answer with a single number written in digits."
      - "Count the chocolate squares on the tray after everything is done. Answer with a single number written in digits."
      - "Once every step is finished, how many squares are on the tray? Answer with a single number written in digits."
      - "What is the final number of chocolate squares on the tray? Answer with a single number written in digits."
    expected:
      type: exact
      value: "30"
    rationale: "Snapping and spreading only rearranges the squares. The tray goes 36, 26 (-10), 38 (+12), 34 (-4), 40 (+6), 30 (-10 to the bowl). The heap looking large does not change the count."
    difficulty: adversarial
    links:
      - relation: different_answer
        target: sc-010
  - id: sc-005
    setup: >
      A jar holds 48 candies. All 48 are handed out evenly to 6 children, so
      each child receives the same number of candies and the jar is left empty.
      Each child then eats 3 of their candies. After that, every child puts all
      of their remaining candies back into the jar. Then 10 fresh candies are
      dropped into the jar. Finally, 6 candies are taken out of the jar and
      given away.
    question: "Does the jar now hold the same number of candies as it held at the start? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Is the number of candies now in the jar equal to the number it started with? Answer with exactly one word: Yes or No."
      - "After everything, does the jar contain as many candies as it did at the beginning? Answer with exactly one word: Yes or No."
      - "Has the jar returned to its original candy count? Answer with exactly one word: Yes or No."
      - "Is the final candy count in the jar the same as the starting count? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "No"
    rationale: "Each child gets 8, eats 3, and returns 5, so 30 come back into the empty jar; adding 10 gives 40, and removing 6 leaves 34, which is not the original 48."
    difficulty: adversarial
    links:
      - relation: different_answer
        target: sc-015
  - id: sc-006
    setup: >
      A pencil case holds 90 pencils, and a drawer beside it holds 12 pencils.
      All 90 pencils are handed out evenly to 6 students, so each student gets
      the same number, and the case is now empty. Each student then returns 6
      pencils to the case. After that, 10 pencils are taken from the case and
      given away outside the class. Then the 12 pencils in the drawer are
      sharpened. Then 5 pencils found on the floor are added to the case.
      Finally, 9 pencils are removed from the case and packed into a bag.
    question: "How many pencils are in the case now? Answer with a single number written in digits."
    paraphrases:
      - "At the end, what is the number of pencils in the case? Answer with a single number written in digits."
      - "Count the pencils left in the case after all the steps. Answer with a single number written in digits."
      - "Once the found pencils and the last removal are done, how many pencils does the case hold? Answer with a single number written in digits."
      - "How many pencils remain in the case at the end? Answer with a single number written in digits."
    expected:
      type: exact
      value: "22"
    rationale: "Each student gets 15 and returns 6, so 36 pencils enter the empty case; removing 10 leaves 26, adding 5 gives 31, and removing 9 leaves 22. Sharpening the drawer pencils is a decoy."
    difficulty: adversarial
