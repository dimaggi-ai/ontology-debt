      an added deposit. Then 42 dollars are received and added to the wallet.
      Then 30 dollars are spent from the wallet. No other money enters or leaves
      the wallet.
    question: "How many dollars are in the wallet now? Answer with a single number written in digits."
    paraphrases:
      - "At the end, how many dollars does the wallet hold? Answer with a single number written in digits."
      - "After all the spending and receiving, what is the amount in the wallet, in dollars? Answer with a single number written in digits."
      - "Count the dollars left in the wallet. Answer with a single number written in digits."
      - "Once every step is done, how many dollars are in the wallet? Answer with a single number written in digits."
    expected:
      type: exact
      value: "50"
    rationale: "The wallet goes 80, 50 (-30), 76 (+26), 38 (half of 76 spent), 80 (+42), 50 (-30). Doubling the piggy bank never touches the wallet."
    difficulty: adversarial
    links:
      - relation: different_answer
        target: sc-001
  - id: sc-013
    setup: >
      Sam and Lee each have a stack of poker chips, and no chips ever pass
      between the two players. Sam starts with 44 chips; then he loses 12 chips,
      then he wins 8 chips, then his stack is doubled, and then he loses 6 chips.
      Lee starts with 30 chips; then he wins 14 chips, then he loses 9 chips,
      then he loses 5 more chips, and then he wins 3 chips.
    question: "Do Sam and Lee now have the same number of chips? Answer with exactly one word: Yes or No."
    paraphrases:
      - "At the end, is Sam's chip count equal to Lee's chip count? Answer with exactly one word: Yes or No."
      - "Do the two players end up holding an equal number of chips? Answer with exactly one word: Yes or No."
      - "Is the number of chips Sam has the same as the number Lee has? Answer with exactly one word: Yes or No."
      - "After all the wins and losses, does Sam match Lee in chip count? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "No"
    rationale: "Sam goes 44, 32, 40, then 80 when doubled, then 74. Lee goes 30, 44, 35, 30, 33. 74 does not equal 33, so they are not the same."
    difficulty: adversarial
    links:
      - relation: same_answer
        target: sc-011
  - id: sc-014
    setup: >
      A farmer has 96 tomatoes in one crate, and a basket nearby holds 20
      tomatoes. He divides the 96 tomatoes equally into 4 crates, so each crate
      holds the same number. From the first crate he sells 10 tomatoes. Into the
      second crate he adds 6 tomatoes he had in his pocket. The third crate is
      left untouched. From the fourth crate he removes 12 tomatoes to feed his
      goats. The basket of 20 tomatoes is carried indoors. He then tips all four
      crates into one big bin. No tomatoes are lost except where stated.
    question: "How many tomatoes are in the big bin now? Answer with a single number written in digits."
    paraphrases:
      - "At the end, how many tomatoes does the big bin hold? Answer with a single number written in digits."
      - "After combining all four crates, what is the number of tomatoes in the bin? Answer with a single number written in digits."
      - "Count the tomatoes in the big bin. Answer with a single number written in digits."
      - "Once all four crates are tipped in, how many tomatoes are in the bin? Answer with a single number written in digits."
    expected:
      type: exact
      value: "80"
    rationale: "Each crate holds 24; they become 14, 30, 24, and 12, which sum to 80 (equivalently 96 minus 10 plus 6 minus 12). The basket is never tipped in."
    difficulty: adversarial
  - id: sc-015
    setup: >
      A tank holds 500 liters of water. The following happens in order: 140
      liters are removed, then 85 liters are added, then the amount of water now
      in the tank is doubled by adding water, then the amount now in the tank is
      halved by removing water, then 30 liters are removed, then 70 liters are
      added, then 45 liters are removed, then 60 liters are added. No water
      enters or leaves except as stated.
    question: "Is the tank now back to exactly 500 liters? Answer with exactly one word: Yes or No."
    paraphrases:
      - "At the end, does the tank hold exactly 500 liters again? Answer with exactly one word: Yes or No."
      - "After all the additions and removals, is the water level back at exactly 500 liters? Answer with exactly one word: Yes or No."
      - "Has the tank returned to precisely 500 liters? Answer with exactly one word: Yes or No."
      - "Is the final amount of water in the tank exactly 500 liters? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "Yes"
    rationale: "The tank goes 500, 360 (-140), 445 (+85), 890 (doubled), 445 (halved), 415 (-30), 485 (+70), 440 (-45), 500 (+60). The double and the halve cancel, and the remaining adds (85+70+60=215) equal the remaining removes (140+30+45=215), so the tank is back to 500."
    difficulty: adversarial
    links:
      - relation: different_answer
        target: sc-005
