      is poured into cup 2. Then 60 milliliters are poured from cup 3 into cup 1.
      Finally, 180 milliliters are drunk from cup 2. Nothing is spilled.
    question: "How many milliliters of water are in cup 2 now? Answer with a single number written in digits."
    paraphrases:
      - "At the end, how many milliliters does cup 2 hold? Answer with a single number written in digits."
      - "After all the pouring and drinking, what is the amount of water in cup 2, in milliliters? Answer with a single number written in digits."
      - "Count the milliliters of water left in cup 2. Answer with a single number written in digits."
      - "Once every step is complete, how many milliliters are in cup 2? Answer with a single number written in digits."
    expected:
      type: exact
      value: "350"
    rationale: "Each cup starts with 210. Cup 2 goes 210, 420 (cup 1 in), 320 (-100 to cup 3), 530 (cup 4 in), 350 (-180 drunk). The cup 3 to cup 1 pour never touches cup 2."
    difficulty: adversarial
    links:
      - relation: different_answer
        target: sc-003
  - id: sc-010
    setup: >
      A shelf holds 120 books, and a nearby cart holds 20 books. First, 40 books
      are removed from the shelf to be repaired. Then 15 of those repaired books
      are returned to the shelf. Then 18 books are taken off the shelf and
      carried to a different room. Then 30 donated books are added to the shelf.
      Then the 20 books on the cart are rearranged into two neat piles. Then 7
      books are removed from the shelf and thrown away. Finally, 8 books are
      removed from the shelf and lent out. No other books are moved on or off the
      shelf.
    question: "How many books are on the shelf now? Answer with a single number written in digits."
    paraphrases:
      - "At the end, what is the number of books on the shelf? Answer with a single number written in digits."
      - "Count the books left on the shelf after all the moves. Answer with a single number written in digits."
      - "Once every step is done, how many books does the shelf hold? Answer with a single number written in digits."
      - "How many books remain on the shelf at the end? Answer with a single number written in digits."
    expected:
      type: exact
      value: "92"
    rationale: "The shelf goes 120, 80 (-40), 95 (+15), 77 (-18), 107 (+30), 100 (-7), 92 (-8). Rearranging the cart's books is a decoy."
    difficulty: adversarial
    links:
      - relation: different_answer
        target: sc-004
  - id: sc-011
    setup: >
      Two plates sit side by side, and every piece mentioned is exactly one
      eighth of a sandwich, with all pieces the same size. On the left plate,
      one whole sandwich is cut into 8 equal pieces and spread out to cover the
      entire plate, so the left plate looks piled high with food. Then 3 of
      those pieces are eaten from the left plate. Then a second whole sandwich is
      cut into 8 equal pieces and all 8 are added to the left plate. Then 5
      pieces are eaten from the left plate. On the right plate, one whole
      sandwich is placed uncut, and then a second whole sandwich is placed beside
      it, also uncut. Then the equivalent of 4 pieces is eaten from the right
      plate. Nothing else is eaten or added.
    question: "Is there more food on the left plate than on the right plate? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Does the left plate hold more sandwich than the right plate? Answer with exactly one word: Yes or No."
      - "Compared with the right plate, is there a greater amount of food on the left plate? Answer with exactly one word: Yes or No."
      - "Is the amount of food on the left plate larger than the amount on the right plate? Answer with exactly one word: Yes or No."
      - "After all the eating, does the left plate have more food than the right plate? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "No"
    rationale: "Measured in equal eighth-sandwich pieces, the left plate ends with 8 pieces (8, then 5 after eating 3, then 13 after adding 8, then 8 after eating 5) and the right plate ends with 12 pieces (16 eighths from two whole sandwiches, minus the 4 eaten). Cutting and spreading the left plate only changes its appearance; 8 is not more than 12, so the left plate does not have more food."
    difficulty: adversarial
    links:
      - relation: same_answer
        target: sc-013
  - id: sc-012
    setup: >
      A wallet contains 80 dollars, and a piggy bank on the shelf holds 15
      dollars. First, 30 dollars are spent from the wallet. Then 26 dollars are
      received and put in the wallet. Then exactly half of the money now in the
