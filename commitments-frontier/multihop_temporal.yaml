  - id: mt-005
    setup: >
      On Saturday, three activities took place in the community hall, listed here
      in no particular order. The chess club met from 1:00pm to 2:15pm. The choir
      rehearsal ran from 10:00am to 11:30am. The yoga class ran from 8:45am to
      9:45am.
    question: "How many minutes passed from the start of the earliest activity to the end of the latest activity? Answer with a single number written in digits."
    paraphrases:
      - "Counting from when the first activity began to when the last activity ended, how many minutes elapsed? Answer with a single number written in digits."
      - "What is the number of minutes between the start of the day's earliest activity and the end of its latest activity? Answer with a single number written in digits."
      - "From the beginning of the earliest activity until the finish of the latest one, how many minutes went by? Answer with a single number written in digits."
      - "How many minutes span the whole stretch from the first activity's start to the last activity's end? Answer with a single number written in digits."
    expected:
      type: exact
      value: "330"
    rationale: "The earliest start is the yoga class at 8:45am; the latest end is the chess club at 2:15pm. From 8:45am to 2:15pm is 5 hours 30 minutes, which is 330 minutes."
    difficulty: adversarial
  - id: mt-006
    setup: >
      Six trains left one station over an afternoon, described here out of order.
      The local to Brime left before the freight to Corley. The express to Aldale
      left before the shuttle to Dunmoor. The shuttle to Dunmoor left before the
      local to Brime. Separately, the parcel train to Elmsford left at 4:00pm and
      the mail train to Fenwick also left at 4:00pm.
    question: "Did the express to Aldale leave before the freight to Corley? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Was the express to Aldale's departure earlier than the freight to Corley's departure? Answer with exactly one word: Yes or No."
      - "Did the express to Aldale pull out of the station before the freight to Corley did? Answer with exactly one word: Yes or No."
      - "Is it true that the express to Aldale departed ahead of the freight to Corley? Answer with exactly one word: Yes or No."
      - "Between the express to Aldale and the freight to Corley, did the express leave first? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "Yes"
    rationale: "The express left before the shuttle, the shuttle left before the local, and the local left before the freight; chaining these, the express left before the freight. The two 4:00pm trains carry no information about that ordering."
    difficulty: adversarial
  - id: mt-007
    setup: >
      Four colleagues each finished a report at some point during one week,
      described here out of order. Cody finished his report before Dana finished
      hers. Alan finished his report before Bea finished hers. Bea finished her
      report before Cody finished his.
    question: "Did Dana finish her report before Alan finished his? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Was Dana's report finished earlier than Alan's report? Answer with exactly one word: Yes or No."
      - "Did Dana complete her report before Alan completed his? Answer with exactly one word: Yes or No."
      - "Is it true that Dana was done with her report before Alan was done with his? Answer with exactly one word: Yes or No."
      - "Between Dana and Alan, did Dana finish first? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "No"
    rationale: "The chain is Alan before Bea, Bea before Cody, and Cody before Dana, so the order is Alan, Bea, Cody, Dana. Dana finished last, so she did not finish before Alan."
    difficulty: adversarial
  - id: mt-008
    setup: >
      A relay had four legs run one after another with rest gaps in between,
      described here from first to last. Leg 1 started at 9:00am and took 25
      minutes. After a 10-minute rest, Leg 2 took 30 minutes. After a 5-minute
      rest, Leg 3 took 20 minutes. After a 15-minute rest, Leg 4 took 35 minutes.
    question: "How many minutes after 9:00am did Leg 4 finish? Answer with a single number written in digits."
    paraphrases:
      - "Counting from 9:00am, how many minutes had passed by the time Leg 4 ended? Answer with a single number written in digits."
      - "How many minutes elapsed between 9:00am and the finish of Leg 4? Answer with a single number written in digits."
      - "Measured from 9:00am, at how many minutes did Leg 4 come to an end? Answer with a single number written in digits."
      - "From the 9:00am start, what is the number of minutes until Leg 4 finished? Answer with a single number written in digits."
    expected:
      type: exact
      value: "140"
    rationale: "Summing legs and rests in order: 25 + 10 + 30 + 5 + 20 + 15 + 35 = 140 minutes after 9:00am."
    difficulty: adversarial
  - id: mt-009
    setup: >
      During a festival, three acts appeared, described here out of order. The
      magician performed for 30 minutes, starting at 7:30pm. The band performed
      for 50 minutes, finishing at 7:10pm. The juggler performed for 40 minutes,
      starting at 6:20pm.
    question: "Could the band and the magician have been performing at the very same moment? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Was there any instant when the band and the magician were both performing? Answer with exactly one word: Yes or No."
      - "Do the band's and the magician's performance times overlap at all? Answer with exactly one word: Yes or No."
      - "Could an onlooker have seen the band and the magician performing simultaneously? Answer with exactly one word: Yes or No."
      - "Is there a moment that falls inside both the band's and the magician's performance? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "No"
    rationale: "The band finished at 7:10pm (50 minutes long, so 6:20pm-7:10pm) and the magician started at 7:30pm; the magician began 20 minutes after the band ended, so they never overlap."
    difficulty: adversarial
