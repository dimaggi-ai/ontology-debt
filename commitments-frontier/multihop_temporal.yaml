      values: ["Yes", "No"]
      value: "Yes"
    rationale: "Greece is 9:00am, so Norse is 9:45am. The Maya tour is 30 minutes before the 2:00pm Egypt tour, so 1:30pm. Norse at 9:45am is earlier than Maya at 1:30pm."
