    question: "Exactly at 3:00pm, how many of the machines were running? Answer with a single number written in digits."
    paraphrases:
      - "At the 3:00pm mark, how many machines were in operation? Answer with a single number written in digits."
      - "Counting the machines that were running right at 3:00pm, how many were there? Answer with a single number written in digits."
      - "How many of the four machines were active at exactly 3:00pm? Answer with a single number written in digits."
