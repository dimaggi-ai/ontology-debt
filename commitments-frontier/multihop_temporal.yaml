  - id: mt-013
    setup: >
      Four emails went out one morning, described here out of order. The invoice
      email was sent 20 minutes after the reminder email. The receipt email was
      sent 5 minutes before the invoice email. A newsletter was also sent at
      exactly noon, unrelated to the timing of the other three.
    question: "Was the receipt email sent before the reminder email? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Was the receipt email's send time earlier than the reminder email's send time? Answer with exactly one word: Yes or No."
      - "Did the receipt email go out before the reminder email did? Answer with exactly one word: Yes or No."
      - "Is it true that the receipt email was sent ahead of the reminder email? Answer with exactly one word: Yes or No."
      - "Between the receipt email and the reminder email, was the receipt one sent first? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "No"
    rationale: "Take the reminder as the reference: the invoice is 20 minutes after it, and the receipt is 5 minutes before the invoice, so the receipt is 15 minutes after the reminder. The receipt was sent after, not before, the reminder; the noon newsletter is irrelevant."
    difficulty: adversarial
  - id: mt-014
    setup: >
      A workshop had three sessions one day, described here out of order. Session
      Two ran from 10:45am to 12:15pm. Session Three ran from 1:30pm to 2:45pm.
      Session One ran from 9:30am to 11:00am.
    question: "Counting only the stretch from the first session's start to the last session's end, how many minutes were not covered by any session? Answer with a single number written in digits."
    paraphrases:
      - "Within the span from the earliest session's start to the latest session's end, how many minutes fell outside every session? Answer with a single number written in digits."
      - "Between the start of the first session and the end of the last session, how many minutes had no session running? Answer with a single number written in digits."
      - "Over the period from the first session's beginning to the last session's finish, how many uncovered minutes were there? Answer with a single number written in digits."
      - "From the earliest session start to the latest session end, what is the number of minutes not spanned by any session? Answer with a single number written in digits."
    expected:
      type: exact
      value: "75"
    rationale: "The span runs 9:30am to 2:45pm, which is 315 minutes. Sessions One and Two together cover 9:30am-12:15pm (165 minutes, since they overlap) and Session Three covers 1:30pm-2:45pm (75 minutes), 240 covered in all; 315 minus 240 leaves a 75-minute gap between 12:15pm and 1:30pm."
    difficulty: adversarial
  - id: mt-015
    setup: >
      Two painters worked on a mural, described here out of order. Painter Two
      started at 1:45pm and worked for 60 minutes without stopping. Painter One
      worked in one continuous 90-minute stretch that finished at 2:30pm.
    question: "Could both painters have been painting at the very same moment? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Was there any instant when both painters were painting at once? Answer with exactly one word: Yes or No."
      - "Do the two painters' working periods overlap in time at all? Answer with exactly one word: Yes or No."
      - "Could an observer have seen the two painters working simultaneously? Answer with exactly one word: Yes or No."
      - "Is there a moment that falls inside both painters' working stretches? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "Yes"
    rationale: "Painter One's 90-minute stretch ending at 2:30pm runs 1:00pm-2:30pm; Painter Two works 1:45pm-2:45pm. They overlap from 1:45pm to 2:30pm, so both could be painting at once."
    difficulty: adversarial
    links:
      - relation: same_answer
        target: mt-003
