id: multihop_temporal
title: "Multi-Hop Temporal Ordering and Duration Arithmetic"
statement: >
  A model must reconstruct a single coherent timeline from facts that are stated
  out of chronological order and mix absolute clock times with relative offsets,
  then answer questions that require composing that timeline: the relative order
  of two events that are never directly compared (transitive ordering), whether
  two intervals overlap enough to co-occur, and how long spans, gaps, or totals
  work out under addition and subtraction. Every fact needed is given explicitly;
  the answer follows by tracking state across the whole chain, and red-herring
  times, distractor events, and reordered narration must not change it.
severity: high
lineage: ["ChronoScope (ACL 2026)", "BECEL temporal consistency (2022)"]
scenarios:
  - id: mt-001
    setup: >
      A courier logged four drop-offs on Tuesday, but jotted them in her notebook
      out of chronological order. The drop-off at the bakery was at 1:50pm. The
      drop-off at the clinic happened 40 minutes before the bakery drop-off. The
      drop-off at the school was at 9:10am. The drop-off at the gym happened 25
      minutes after the school drop-off.
    question: "Did the gym drop-off happen after the bakery drop-off? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Was the drop-off at the gym later in the day than the drop-off at the bakery? Answer with exactly one word: Yes or No."
      - "Did the courier reach the gym after she reached the bakery? Answer with exactly one word: Yes or No."
      - "Was the gym drop-off made at a later time than the bakery drop-off? Answer with exactly one word: Yes or No."
      - "Is it true that the gym drop-off came after the bakery drop-off? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "No"
    rationale: "The school drop-off is 9:10am, so the gym is 9:35am; the clinic is 1:10pm (40 minutes before the 1:50pm bakery). The gym at 9:35am is well before the 1:50pm bakery drop-off, not after it."
    difficulty: adversarial
    links:
      - relation: different_answer
        target: mt-002
