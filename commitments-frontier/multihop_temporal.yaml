  - id: mt-003
    setup: >
      In one studio, three activities were scheduled, but they are described here
      out of order. The photographer worked from 3:15pm to 4:45pm. The recording
      session ran from 2:00pm to 3:30pm. The caterer set up from 1:00pm to 2:20pm.
    question: "Could the recording session and the photographer's work have been happening at the very same moment? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Was there any instant when the recording session and the photographer's work were both underway? Answer with exactly one word: Yes or No."
      - "Do the recording session and the photographer's working period overlap in time at all? Answer with exactly one word: Yes or No."
      - "Could someone have caught the recording session and the photographer working simultaneously? Answer with exactly one word: Yes or No."
      - "Is there a moment that falls inside both the recording session and the photographer's work? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "Yes"
    rationale: "The recording session runs 2:00pm-3:30pm and the photographer 3:15pm-4:45pm; these overlap from 3:15pm to 3:30pm, so they could co-occur."
    difficulty: adversarial
    links:
      - relation: different_answer
        target: mt-004
      - relation: same_answer
        target: mt-015
