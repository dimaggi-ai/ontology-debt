  - id: nn-004
    setup: >
      Before a storm, a caretaker was asked to latch five windows: the
      Kitchen, the Attic, the Study, the Hall, and the Garage window. At first
      all five were unlatched. He latched the Kitchen, the Hall, and the
      Garage. He latched the Attic window too, but a strong gust later shook it
      and its latch popped open again, leaving the Attic window unlatched. He
      started to latch the Study window, was called away before finishing, and
      a neighbor came by and latched the Study window fully. No one touched any
      window after that.
    question: "Consider this claim about the windows right now: 'It is not false that not all of the five windows are latched.' Is that claim correct? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Is the following statement about the windows right now accurate: 'It is not false that not all of the five windows are latched.'? Answer with exactly one word: Yes or No."
      - "Decide whether this claim holds right now: 'It is not false that not all of the five windows are latched.' Answer with exactly one word: Yes or No."
      - "Right now, is it correct to say that it is not false that not all of the five windows are latched? Answer with exactly one word: Yes or No."
      - "Evaluate this statement about the current situation: it is not false that not all of the five windows are latched. Is it true? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "Yes"
    rationale: "The Attic window's latch popped open, so it is unlatched while the other four are latched; 'not all are latched' is therefore true, and 'it is not false that [true]' is true."
    difficulty: adversarial
