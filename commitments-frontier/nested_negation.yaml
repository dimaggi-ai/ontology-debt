id: nested_negation
title: "Nested and Scoped Negation"
statement: >
  A model must resolve nested, stacked, and scoped negation to a definite
  state whenever the underlying facts are fully stated. Double and triple
  negation must cancel correctly ("it is not the case that none of the
  doors is unlocked" asserts that at least one door is unlocked). Negation
  must compose correctly with quantifiers ("not all of the five doors are
  locked" entails at least one is unlocked; "none of them failed to sign"
  entails everyone signed) and with the scope of "and"/"or" ("she did not
  both call and email" allows at most one of the two). A model that miscounts
  the negations, mis-scopes a negation over a quantifier, or lets a negation
  slip past a conjunction does not hold a stable model of the described
  situation.
severity: high
lineage: ["CondaQA (2022)", "BECEL negational consistency (2022)", "ParaRel negation probes (2021)"]
scenarios:
  - id: nn-001
    setup: >
      A night watchman is responsible for five doors in an old library: the
      North door, the South door, the East door, the West door, and the
      Cellar door. When his shift began, all five doors were locked. During
      the shift only these things happened: he unlocked the South door to let
      a book cart through and left it unlocked; a cleaner unlocked the East
      door, stepped outside, and then locked it again from the outside; and a
      gust of wind rattled the West door but did not change its lock. Nobody
      touched the North door or the Cellar door.
    question: "Consider this claim about the doors right now: 'It is not the case that none of the five doors is unlocked.' Is that claim correct? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Is the following statement about the doors right now accurate: 'It is not the case that none of the five doors is unlocked.'? Answer with exactly one word: Yes or No."
      - "Decide whether this claim holds right now: 'It is not the case that none of the five doors is unlocked.' Answer with exactly one word: Yes or No."
      - "Right now, is it correct to say that it is not the case that none of the five doors is unlocked? Answer with exactly one word: Yes or No."
      - "Evaluate this statement about the current situation: it is not the case that none of the five doors is unlocked. Is it true? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "Yes"
    rationale: "Start locked; South ends unlocked, East is unlocked then relocked, others untouched, so exactly the South door is unlocked. 'None is unlocked' is false, so 'it is not the case that none is unlocked' is true."
    difficulty: adversarial
    links:
      - relation: different_answer
        target: nn-002
