  - id: nn-013
    setup: >
      Five committee members each cast exactly one vote on a single motion,
      either to approve or to reject it. Paula voted to approve. Quim leaned
      toward approving during the debate but ultimately cast his vote to
      reject. Rosa voted to reject. Sami's ballot was at first miscounted as an
      approval, but the correction confirmed he had actually voted to reject.
      Tariq voted to approve. The final tally counts each member's actual vote.
    question: "In the final tally, how many of the five members did not vote to approve? Answer with a single number written in digits."
    paraphrases:
      - "Count them: in the final tally, how many of the five members did not vote to approve? Answer with a single number written in digits."
      - "Give the number of members who did not vote to approve in the final tally. Answer with a single number written in digits."
      - "How many of the five members failed to vote to approve, exactly? Answer with a single number written in digits."
      - "State how many of the five members did not cast a vote to approve. Answer with a single number written in digits."
    expected:
      type: exact
      value: "3"
    rationale: "Paula and Tariq approved; Quim, Rosa, and Sami each ultimately voted to reject. 'Did not vote to approve' means voted to reject, so three members did not vote to approve."
    difficulty: adversarial
