  - id: nn-006
    setup: >
      A petition needed signatures from five neighbors: Ana, Ben, Cara, Deniz,
      and Ela. Over the week the following happened: Ana signed it on Monday.
      Ben said he would sign and did sign on Tuesday. Cara read it, disagreed,
      and never signed. Deniz signed on Wednesday. Ela signed on Thursday. No
      one crossed out or withdrew a signature afterward.
    question: "Consider this claim: 'None of the five neighbors failed to sign the petition.' Is that claim correct? Answer with exactly one word: Yes or No."
    paraphrases:
      - "Is the following statement accurate: 'None of the five neighbors failed to sign the petition.'? Answer with exactly one word: Yes or No."
      - "Decide whether this claim holds: 'None of the five neighbors failed to sign the petition.' Answer with exactly one word: Yes or No."
      - "Is it correct to say that none of the five neighbors failed to sign the petition? Answer with exactly one word: Yes or No."
      - "Evaluate this statement about the signatures: none of the five neighbors failed to sign the petition. Is it true? Answer with exactly one word: Yes or No."
    expected:
      type: choice
      values: ["Yes", "No"]
      value: "No"
    rationale: "'None failed to sign' means everyone signed. Cara never signed, so someone did fail to sign, and the claim is false."
    difficulty: adversarial
    links:
      - relation: different_answer
        target: nn-007
