# Model registry. Pricing is per million tokens - VERIFY against current
# provider pricing pages before trusting cost estimates.
#
# Note on sampling: current-generation Anthropic models (Sonnet 5, Opus 4.7+)
# reject `temperature`/`top_p`/`top_k`; OpenAI reasoning-family models reject
# `temperature` too. We therefore pass no sampling params by default and
# document run-to-run variance instead of pretending temperature=0 buys
# determinism. `params` is passed through to the provider verbatim.

models:
  - name: claude-sonnet-5
    provider: anthropic
    model_id: claude-sonnet-5
    max_tokens: 100
    params:
      thinking: { type: disabled }   # measure the base model, keep probes cheap
    input_price_per_mtok: 3.00
    output_price_per_mtok: 15.00

  - name: claude-haiku-4-5
    provider: anthropic
    model_id: claude-haiku-4-5
    max_tokens: 100
    input_price_per_mtok: 1.00
    output_price_per_mtok: 5.00

  # OpenAI capability-gradient tiers (pinned snapshots). Reasoning models spend
  # hidden tokens before answering, so max_tokens has headroom and
  # est_output_tokens_per_probe counts them. Prices are approximate - the run
  # reports real usage. Run all three: --models gpt-frontier,gpt-mini,gpt-nano
  - name: gpt-frontier
    provider: openai
    model_id: gpt-5.5-2026-04-23
    max_tokens: 3000
    params: { reasoning_effort: low }
    input_price_per_mtok: 1.25
    output_price_per_mtok: 10.00
    est_output_tokens_per_probe: 350

  - name: gpt-mini
    provider: openai
    model_id: gpt-5.4-mini-2026-03-17
    max_tokens: 3000
    params: { reasoning_effort: low }
    input_price_per_mtok: 0.25
    output_price_per_mtok: 2.00
    est_output_tokens_per_probe: 350

  - name: gpt-nano
    provider: openai
    model_id: gpt-5.4-nano-2026-03-17
    max_tokens: 3000
    params: { reasoning_effort: low }
    input_price_per_mtok: 0.05
    output_price_per_mtok: 0.40
    est_output_tokens_per_probe: 350

  # Audits via the local `claude -p` CLI using your Claude Code auth - no API
  # key. Exercises the tool's real provider path against a live Claude model.
  - name: claude-cli
    provider: claude_cli
    model_id: claude-code-cli
    max_tokens: 100

  # Re-scores a committed set of recorded model responses deterministically,
  # with no API access (point answer_book_path at a committed answers file).
  #   provider: mock
  #   params: { answer_book_path: examples/<run>/answers.json }

  - name: mock
    provider: mock
    model_id: mock-v0
    params:
      failure_rate: 0.08
